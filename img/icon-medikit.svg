<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none"
     stroke="#3c2a16" stroke-linecap="round" stroke-linejoin="round">

  <!-- ── KOFFER-KÖRPER ───────────────────────── -->
  <rect x="2" y="8" width="36" height="28" rx="3"
        fill="rgba(208,195,155,0.70)" stroke-width="1.3"/>

  <!-- Deckel-Trennlinie -->
  <line x1="2" y1="17" x2="38" y2="17" stroke-width="0.85" stroke-opacity="0.55"/>

  <!-- Scharnier-Andeutung hinten -->
  <g fill="rgba(145,130,98,0.75)" stroke-width="0.8">
    <rect x="17" y="16.4" width="2.5" height="1.2" rx="0.4"/>
    <rect x="21" y="16.4" width="2.5" height="1.2" rx="0.4"/>
  </g>

  <!-- Eckenschutz (Corner protection) – alle 4 Ecken -->
  <g fill="rgba(145,130,98,0.68)" stroke-width="0.9">
    <!-- oben links -->
    <path d="M2.5 8 L7 8 L7 9.5 L4 9.5 L4 13 L2.5 13 Z"/>
    <!-- oben rechts -->
    <path d="M33 8 L37.5 8 L37.5 13 L36 13 L36 9.5 L33 9.5 Z"/>
    <!-- unten links -->
    <path d="M2.5 31 L4 31 L4 34.5 L7 34.5 L7 36 L2.5 36 Z"/>
    <!-- unten rechts -->
    <path d="M33 34.5 L36 34.5 L36 31 L37.5 31 L37.5 36 L33 36 Z"/>
  </g>

  <!-- ── GRIFF ──────────────────────────────── -->
  <path d="M14 8 L14 5.5 Q14 3.5 16 3.5 L24 3.5 Q26 3.5 26 5.5 L26 8"
        stroke-width="1.25"/>
  <!-- Griff-Polster -->
  <rect x="15.5" y="3.5" width="9" height="4" rx="1.5"
        fill="rgba(75,52,22,0.55)" stroke-width="1.0"/>
  <!-- Griff-Nähte -->
  <line x1="16.5" y1="4" x2="23.5" y2="4" stroke-width="0.5" stroke-opacity="0.45"/>
  <line x1="16.5" y1="7" x2="23.5" y2="7" stroke-width="0.5" stroke-opacity="0.45"/>

  <!-- ── SCHLOSS / VERSCHLUSS ───────────────── -->
  <!-- Schnappverschluss Mitte -->
  <rect x="16.5" y="15.5" width="7" height="4" rx="1.2"
        fill="rgba(148,132,100,0.82)" stroke-width="1.05"/>
  <!-- Schloss-Drücker -->
  <rect x="18.5" y="16.5" width="3" height="2" rx="0.8"
        fill="rgba(185,170,132,0.88)" stroke-width="0.85"/>
  <line x1="19.5" y1="17" x2="20.5" y2="17.5" stroke-width="0.6" stroke-opacity="0.5"/>

  <!-- ── ROTES KREUZ ─────────────────────────── -->
  <!-- Kreuz-Hintergrund (leicht abgerundetes Kreuz) -->
  <!-- Vertikal -->
  <rect x="14.5" y="19" width="11" height="15" rx="1.5"
        fill="rgba(155,25,25,0.80)" stroke="rgba(100,14,14,0.9)" stroke-width="1.1"/>
  <!-- Horizontal -->
  <rect x="8.5" y="23.5" width="23" height="6" rx="1.5"
        fill="rgba(155,25,25,0.80)" stroke="rgba(100,14,14,0.9)" stroke-width="1.1"/>

  <!-- Kreuz-Glanz (Hochlicht) -->
  <path d="M15.5 20 Q17 19.5 19.5 19.8" stroke="rgba(220,100,100,0.40)" stroke-width="0.8" fill="none"/>
  <path d="M9.5 24 Q12 23.5 15 23.8" stroke="rgba(220,100,100,0.38)" stroke-width="0.8" fill="none"/>

  <!-- ── SEITENRILLEN / STRUKTURDETAIL ──────── -->
  <g stroke-width="0.5" stroke-opacity="0.28">
    <line x1="3" y1="12" x2="37" y2="12"/>
    <line x1="3" y1="30" x2="13" y2="30"/>
    <line x1="27" y1="30" x2="37" y2="30"/>
  </g>

  <!-- Typenschild-Andeutung (unten rechts) -->
  <rect x="29" y="31.5" width="6.5" height="3.5" rx="0.8"
        fill="rgba(185,172,132,0.55)" stroke-width="0.7" stroke-opacity="0.5"/>
  <line x1="29.8" y1="33" x2="34.8" y2="33" stroke-width="0.4" stroke-opacity="0.4"/>
  <line x1="29.8" y1="34" x2="33" y2="34" stroke-width="0.4" stroke-opacity="0.4"/>
</svg>
