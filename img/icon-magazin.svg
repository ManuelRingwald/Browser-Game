<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 44" fill="none"
     stroke="#3c2a16" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.4">

  <!-- Einspeise-Lippen (oben) -->
  <path d="M6 10 L6 5 Q6 3.5 8 3.5 L20 3.5 Q22 3.5 22 5 L22 10"
        fill="rgba(148,132,100,0.68)"/>

  <!-- Patronen-Köpfe oben sichtbar -->
  <ellipse cx="11" cy="3.8" rx="2.8" ry="1.6" fill="rgba(72,58,28,0.85)" stroke-width="0.9"/>
  <ellipse cx="17" cy="3.8" rx="2.8" ry="1.6" fill="rgba(72,58,28,0.85)" stroke-width="0.9"/>

  <!-- Magazin-Körper -->
  <rect x="4" y="10" width="20" height="28" rx="2.5" fill="rgba(188,172,138,0.62)"/>

  <!-- Patronen-Reihen (gestaffelt) -->
  <g stroke-width="0.65" stroke-opacity="0.42" fill="rgba(72,58,28,0.22)">
    <ellipse cx="11" cy="16" rx="3.2" ry="2"/>
    <ellipse cx="17" cy="16" rx="3.2" ry="2"/>
    <ellipse cx="11" cy="22" rx="3.2" ry="2"/>
    <ellipse cx="17" cy="22" rx="3.2" ry="2"/>
    <ellipse cx="11" cy="28" rx="3.2" ry="2"/>
    <ellipse cx="17" cy="28" rx="3.2" ry="2"/>
    <ellipse cx="14" cy="34" rx="3.2" ry="2"/>
  </g>

  <!-- Fenster (Ladestandsanzeige) links -->
  <rect x="4.5" y="14" width="2.5" height="18" rx="1" fill="rgba(45,30,12,0.18)" stroke-width="0.8"/>

  <!-- Bodenplatte -->
  <rect x="3" y="37" width="22" height="3.5" rx="1.8" fill="rgba(138,118,80,0.72)" stroke-width="1.1"/>
  <!-- Knopf in Bodenplatte -->
  <circle cx="14" cy="38.8" r="1.8" fill="rgba(105,88,55,0.75)" stroke-width="0.9"/>
</svg>
