<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 36" fill="none"
     stroke="#3c2a16" stroke-linecap="round" stroke-linejoin="round">

  <!-- ── OBERER LAUF ─────────────────────────── -->
  <path d="M1.5 10.5 L35 10.5 L35 13 L1.5 13 Z"
        fill="rgba(168,152,118,0.62)" stroke-width="1.1"/>
  <!-- Lauf-Rippe (ventilated rib) -->
  <path d="M1.5 9.8 L35 9.8" stroke-width="0.6" stroke-opacity="0.55"/>
  <!-- Rippen-Querstreben -->
  <g stroke-width="0.45" stroke-opacity="0.42">
    <line x1="5"  y1="9.8" x2="5"  y2="10.5"/>
    <line x1="9"  y1="9.8" x2="9"  y2="10.5"/>
    <line x1="13" y1="9.8" x2="13" y2="10.5"/>
    <line x1="17" y1="9.8" x2="17" y2="10.5"/>
    <line x1="21" y1="9.8" x2="21" y2="10.5"/>
    <line x1="25" y1="9.8" x2="25" y2="10.5"/>
    <line x1="29" y1="9.8" x2="29" y2="10.5"/>
    <line x1="33" y1="9.8" x2="33" y2="10.5"/>
  </g>
  <!-- Lauf-Innenkanal -->
  <line x1="2.5" y1="11.75" x2="34.5" y2="11.75" stroke-width="0.4" stroke-opacity="0.38"/>

  <!-- ── UNTERER LAUF (Magazinrohr) ───────────── -->
  <path d="M4.5 13.5 L30 13.5 L30 16 L4.5 16 Z"
        fill="rgba(158,142,108,0.58)" stroke-width="1.0"/>
  <!-- Magazinrohr-Naht -->
  <line x1="5" y1="14.75" x2="29.5" y2="14.75" stroke-width="0.4" stroke-opacity="0.35"/>

  <!-- Laufmündung Doppel -->
  <path d="M1.5 9.5 L1.5 13.2" stroke-width="2.2"/>
  <path d="M4.5 13.2 L4.5 16.2" stroke-width="2.0"/>
  <!-- Mündungs-Kompensatoren -->
  <path d="M1.5 9.5 Q2 8.8 2.8 9.5" stroke-width="0.7"/>
  <path d="M4.5 15.8 Q5 16.5 5.8 15.8" stroke-width="0.7"/>

  <!-- ── PUMP-GRIFFSTÜCK (Forend) ──────────────── -->
  <path d="M9 10.5 L9 16 Q9 17.2 10 17.2 L21 17.2 Q22 17.2 22 16 L22 10.5 Z"
        fill="rgba(75,50,22,0.65)" stroke-width="1.15"/>
  <!-- Pump-Rillen -->
  <g stroke="rgba(55,35,10,0.30)" stroke-width="0.65">
    <line x1="11"  y1="10.8" x2="11"  y2="17"/>
    <line x1="13"  y1="10.8" x2="13"  y2="17"/>
    <line x1="15"  y1="10.8" x2="15"  y2="17"/>
    <line x1="17"  y1="10.8" x2="17"  y2="17"/>
    <line x1="19.5" y1="10.8" x2="19.5" y2="17"/>
  </g>
  <!-- Pump-Schraube vorne -->
  <circle cx="9.8" cy="13.25" r="0.9" fill="rgba(148,132,100,0.75)" stroke-width="0.8"/>

  <!-- ── RECEIVER / ACTION ──────────────────── -->
  <path d="M30 8 Q30.5 7.5 31.5 7.5 L44 7.5 Q45 7.5 45 8.5
           L45 19 Q45 19.8 44 19.8 L31.5 19.8 Q30.5 19.8 30 19 Z"
        fill="rgba(188,173,138,0.60)" stroke-width="1.2"/>

  <!-- Auswurfhülse (Ejection port) -->
  <path d="M33 7.8 L41 7.8 L41 13.5 L33 13.5"
        fill="rgba(45,30,12,0.18)" stroke-width="0.9"/>

  <!-- Schlagbolzen-Spannhebel (Hammer) -->
  <path d="M41.5 7.5 L43.5 5 Q44 4.5 44.5 5 L44.5 7.5"
        fill="rgba(145,130,98,0.68)" stroke-width="1.0"/>
  <circle cx="43" cy="5.2" r="0.7" fill="rgba(55,38,18,0.45)" stroke-width="0"/>

  <!-- ── ABZUGSBÜGEL ──────────────────────── -->
  <path d="M32.5 19.8 Q31 21 31 23 L31 27.5 Q31 28.5 32.5 28.5
           L42 28.5 Q43.5 28.5 43.5 27 L43.5 19.8"
        fill="rgba(188,173,138,0.42)" stroke-width="1.1"/>
  <!-- Abzug -->
  <path d="M36 19.8 Q35.5 24.5 37.5 27.5" stroke-width="1.1"/>
  <!-- Abzug-Feder-Detail -->
  <line x1="36.5" y1="21" x2="37" y2="25" stroke-width="0.5" stroke-opacity="0.38"/>

  <!-- ── KOLBEN (Pistol Grip Stock) ──────────── -->
  <path d="M45 8.5 L55 9.5 Q57.5 10 58.5 11.5 L59.5 13.5
           Q60 15 59 16.5 L57.5 18 Q56 19.5 54.5 19.5 L45 19.5 Z"
        fill="rgba(78,52,22,0.66)" stroke-width="1.2"/>

  <!-- Schaftkappe -->
  <path d="M57.5 10 Q62 11.5 62.5 13.5 Q62.5 15.5 60 17.5"
        fill="rgba(62,40,15,0.55)" stroke-width="1.3"/>

  <!-- Kolben-Holzmaserung -->
  <g stroke="rgba(55,35,10,0.2)" stroke-width="0.5">
    <path d="M46 9.5 Q50 11 54 9.8"/>
    <path d="M46 11.5 Q50 13 55.5 11.5"/>
    <path d="M46 13.5 Q50 15 56 13.5"/>
    <path d="M46 15.5 Q50 17 55 15.5"/>
    <path d="M46 17.5 Q49 18.5 53 17.5"/>
  </g>

  <!-- Schaftschraube -->
  <circle cx="47.5" cy="14" r="1.3" fill="rgba(148,132,100,0.75)" stroke-width="0.9"/>
  <line x1="47" y1="14" x2="48" y2="14" stroke-width="0.55" stroke-opacity="0.55"/>

  <!-- ── VORDERES VISIER ──────────────────── -->
  <rect x="30.5" y="6.8" width="2.2" height="1.6" rx="0.3"
        fill="rgba(55,38,18,0.75)" stroke-width="0.85"/>
</svg>
